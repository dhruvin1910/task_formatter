<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Task Formatter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #171717;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --text: #e8e8e8;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #e8e8e8;
    --success: #4ade80;
    --error: #f87171;
    --info: #60a5fa;
    --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  .app { max-width: 860px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .header h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.04em; color: var(--text); }
  .header .date { font-size: 11px; color: var(--text-dim); }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .panel-header .label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .panel-header .meta { font-size: 10px; color: var(--text-dim); }

  textarea, .output-box {
    width: 100%;
    height: 250px;
    padding: 14px;
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.7;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
  }

  textarea::placeholder { color: var(--text-dim); }

  .output-box {
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-box.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .btn {
    padding: 7px 18px;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    transition: background 0.1s, opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
  }

  .btn-ghost:hover { background: var(--surface); color: var(--text); }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-sm { padding: 3px 10px; font-size: 10px; }

  .status {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .status.loading { color: var(--info); }
  .status.error   { color: var(--error); }
  .status.success { color: var(--success); }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .log-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .log-actions { display: flex; gap: 6px; }

  .log-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    max-height: 300px;
    overflow-y: auto;
    padding: 14px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .log-box.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    color: var(--text-dim);
    font-size: 11px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>daily task formatter</h1>
    <span class="date" id="today-date"></span>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <span class="label">raw input</span>
        <span class="meta" id="raw-count">0 lines</span>
      </div>
      <textarea id="raw-input" placeholder="Type anything...
e.g. fixed gatepass bug, setup uest erp, added notification permissions"></textarea>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="label">formatted output</span>
        <button class="btn btn-ghost btn-sm" onclick="copyOutput()">copy</button>
      </div>
      <div class="output-box empty" id="output-box">output will appear here</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="generate-btn" onclick="generate()">generate</button>
    <button class="btn btn-ghost" id="save-btn" onclick="saveToFile()" disabled>save to file</button>
    <button class="btn btn-ghost" onclick="clearInput()">clear</button>
    <span class="status" id="status"></span>
  </div>

  <hr />

  <div class="log-header">
    <span class="log-title">work log</span>
    <div class="log-actions">
      <button class="btn btn-ghost btn-sm" onclick="loadLog()">refresh</button>
      <button class="btn btn-ghost btn-sm" onclick="copyLog()">copy all</button>
      <button class="btn btn-ghost btn-sm" onclick="downloadLog()">⬇ download</button>
      <button class="btn btn-ghost btn-sm" onclick="clearLog()">clear</button>
    </div>
  </div>
  <div class="log-box empty" id="log-box">loading...</div>

</div>

<script>
let currentOutput = '';

function init() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  document.getElementById('raw-input').addEventListener('input', function () {
    const n = this.value.split('\n').filter(l => l.trim()).length;
    document.getElementById('raw-count').textContent = n + ' line' + (n !== 1 ? 's' : '');
  });

  loadLog();
}

async function generate() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { setStatus('enter some tasks first', 'error'); return; }

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  setStatus('generating...', 'loading');

  const ob = document.getElementById('output-box');
  ob.classList.remove('empty');
  ob.textContent = '';

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'request failed');

    currentOutput = data.formatted;
    ob.textContent = currentOutput;
    document.getElementById('save-btn').disabled = false;
    setStatus('done', 'success');
  } catch (err) {
    setStatus('error: ' + err.message, 'error');
    ob.textContent = 'output will appear here';
    ob.classList.add('empty');
  } finally {
    btn.disabled = false;
  }
}

async function saveToFile() {
  if (!currentOutput) return;

  try {
    const res = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ formatted: currentOutput })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'save failed');

    document.getElementById('save-btn').disabled = true;
    setStatus('saved → ' + data.file, 'success');
    loadLog();
  } catch (err) {
    setStatus('error: ' + err.message, 'error');
  }
}

async function loadLog() {
  const box = document.getElementById('log-box');
  try {
    const res = await fetch('/log');
    const text = await res.text();
    if (!text.trim() || text === 'no entries yet') {
      box.textContent = 'no entries yet';
      box.classList.add('empty');
    } else {
      box.textContent = text;
      box.classList.remove('empty');
    }
  } catch {
    box.textContent = 'could not load log';
    box.classList.add('empty');
  }
}

async function clearLog() {
  if (!confirm('Clear the entire work log file?')) return;
  await fetch('/log', { method: 'DELETE' });
  loadLog();
  setStatus('log cleared', 'success');
}

function copyOutput() {
  if (currentOutput) { navigator.clipboard.writeText(currentOutput); setStatus('copied!', 'success'); }
}

function copyLog() {
  const text = document.getElementById('log-box').textContent;
  if (text && text !== 'no entries yet') {
    navigator.clipboard.writeText(text);
    setStatus('log copied!', 'success');
  }
}

async function downloadLog() {
  try {
    const res = await fetch('/log');
    const text = await res.text();
    if (!text.trim() || text === 'no entries yet') {
      setStatus('no log to download', 'error');
      return;
    }
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const date = new Date().toISOString().slice(0, 10);
    a.download = `work_log_${date}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('log downloaded!', 'success');
  } catch {
    setStatus('download failed', 'error');
  }
}

function clearInput() {
  document.getElementById('raw-input').value = '';
  document.getElementById('raw-count').textContent = '0 lines';
  const ob = document.getElementById('output-box');
  ob.textContent = 'output will appear here';
  ob.classList.add('empty');
  currentOutput = '';
  document.getElementById('save-btn').disabled = true;
  setStatus('', '');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

init();
</script>
</body>
</html>
